blueprint:
  name: UniFi Doorbell -> Sonos Google Announcement (Sync)
  description: >
    Announces a custom Google TTS message on selected Sonos speakers when a
    UniFi Protect doorbell emits a real ring event. Uses one shared
    announcement volume for the best multi-room sync. Includes an optional
    cooldown to suppress duplicate or replayed rings.
  domain: automation
  input:
    doorbell_event_entity:
      name: Doorbell event entity
      description: UniFi Protect doorbell event entity
      selector:
        entity:
          filter:
            - domain: event

    google_tts_entity:
      name: Google TTS entity
      description: Google TTS entity to use
      default: tts.google_translate_en_com
      selector:
        entity:
          filter:
            - domain: tts

    target_speakers:
      name: Sonos speakers
      description: Speakers that should receive the announcement
      selector:
        entity:
          filter:
            - domain: media_player
          multiple: true

    announcement_message:
      name: Announcement message
      description: Text to speak
      default: Someone is at the front door
      selector:
        text:

    announcement_volume:
      name: Announcement volume
      description: Shared announcement volume for all speakers
      default: 35
      selector:
        number:
          min: 1
          max: 100
          step: 1
          mode: slider
          unit_of_measurement: "%"

    cooldown_seconds:
      name: Cooldown seconds
      description: Ignore duplicate or replayed rings for this many seconds
      default: 5
      selector:
        number:
          min: 0
          max: 60
          step: 1
          mode: slider
          unit_of_measurement: s

mode: single
max_exceeded: silent

variables:
  google_tts_entity: !input google_tts_entity
  announcement_message: !input announcement_message
  cooldown_seconds: !input cooldown_seconds

trigger:
  - platform: state
    entity_id: !input doorbell_event_entity

condition:
  - condition: template
    value_template: >-
      {{
        trigger.to_state is not none
        and trigger.from_state is not none
        and trigger.to_state.attributes is not none
        and trigger.to_state.attributes.event_type | default('') == 'ring'
        and trigger.to_state.state != trigger.from_state.state
        and trigger.from_state.state not in ['unknown', 'unavailable']
        and (
          state_attr(this.entity_id, 'last_triggered') is none
          or
          (
            as_timestamp(now()) -
            as_timestamp(state_attr(this.entity_id, 'last_triggered'))
          ) > (cooldown_seconds | int)
        )
      }}

action:
  - service: media_player.play_media
    target:
      entity_id: !input target_speakers
    data:
      announce: true
      media_content_id: >-
        media-source://tts/{{ google_tts_entity }}?message={{ announcement_message | urlencode }}
      media_content_type: music
      extra:
        volume: !input announcement_volume
