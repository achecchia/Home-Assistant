blueprint:
  name: UniFi Doorbell -> Sonos Google Announcement (Per Speaker Volume)
  description: >
    Announces a custom Google TTS message on selected Sonos speakers when a
    UniFi Protect doorbell emits a real ring event. Supports per-speaker
    announcement volume. Includes an optional cooldown to suppress duplicate
    or replayed rings.
  domain: automation
  input:
    doorbell_event_entity:
      name: Doorbell event entity
      description: UniFi Protect doorbell event entity
      selector:
        entity:
          filter:
            - domain: event

    google_tts_entity:
      name: Google TTS entity
      description: Google TTS entity to use
      default: tts.google_translate_en_com
      selector:
        entity:
          filter:
            - domain: tts

    announcement_message:
      name: Announcement message
      description: Text to speak
      default: Someone is at the front door
      selector:
        text:

    speaker_configs:
      name: Speakers and volumes
      description: Add one row per speaker with its own announcement volume
      selector:
        object:
          multiple: true
          label_field: speaker
          description_field: volume
          fields:
            speaker:
              label: Speaker
              required: true
              selector:
                entity:
                  filter:
                    - domain: media_player
                  multiple: false
            volume:
              label: Volume
              required: true
              selector:
                number:
                  min: 1
                  max: 100
                  step: 1
                  mode: slider
                  unit_of_measurement: "%"

    cooldown_seconds:
      name: Cooldown seconds
      description: Ignore duplicate or replayed rings for this many seconds
      default: 5
      selector:
        number:
          min: 0
          max: 60
          step: 1
          mode: slider
          unit_of_measurement: s

    inter_speaker_delay_ms:
      name: Delay between speakers
      description: >
        Optional delay between per-speaker announcements. Leave at 0 for
        fastest playback. Increase slightly only if a site behaves unreliably.
      default: 0
      selector:
        number:
          min: 0
          max: 1000
          step: 50
          mode: slider
          unit_of_measurement: ms

mode: single
max_exceeded: silent

variables:
  google_tts_entity: !input google_tts_entity
  announcement_message: !input announcement_message
  speaker_configs: !input speaker_configs
  cooldown_seconds: !input cooldown_seconds
  inter_speaker_delay_ms: !input inter_speaker_delay_ms

trigger:
  - platform: state
    entity_id: !input doorbell_event_entity

condition:
  - condition: template
    value_template: >-
      {{
        trigger.to_state is not none
        and trigger.from_state is not none
        and trigger.to_state.attributes is not none
        and trigger.to_state.attributes.event_type | default('') == 'ring'
        and trigger.to_state.state != trigger.from_state.state
        and trigger.from_state.state not in ['unknown', 'unavailable']
        and (
          state_attr(this.entity_id, 'last_triggered') is none
          or
          (
            as_timestamp(now()) -
            as_timestamp(state_attr(this.entity_id, 'last_triggered'))
          ) > (cooldown_seconds | int)
        )
      }}

action:
  - repeat:
      for_each: "{{ speaker_configs }}"
      sequence:
        - service: media_player.play_media
          target:
            entity_id: "{{ repeat.item.speaker }}"
          data:
            announce: true
            media_content_id: >-
              media-source://tts/{{ google_tts_entity }}?message={{ announcement_message | urlencode }}
            media_content_type: music
            extra:
              volume: "{{ repeat.item.volume | int }}"
        - if:
            - condition: template
              value_template: "{{ inter_speaker_delay_ms | int > 0 }}"
          then:
            - delay:
                milliseconds: "{{ inter_speaker_delay_ms | int }}"
